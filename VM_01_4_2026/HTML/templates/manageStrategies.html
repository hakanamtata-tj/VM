<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Strategies - TradeJenie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/manageStrategies.css') }}">
</head>
<body>
    <!-- Header (Reusable) -->
    {% include 'header.html' %}

    <!-- Main Container -->
    <div class="container-main">
        <!-- Breadcrumb -->
        <div class="breadcrumb-nav">
            <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
            <span> / Manage Strategies</span>
        </div>

        <!-- Alerts -->
        <div class="alert-container">
            <div class="alert alert-success" id="successAlert" role="alert">
                <i class="fas fa-check-circle"></i> <span id="successMessage"></span>
            </div>
            <div class="alert alert-danger" id="errorAlert" role="alert">
                <i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span>
            </div>
            <div class="alert alert-info" id="infoAlert" role="alert">
                <i class="fas fa-info-circle"></i> <span id="infoMessage"></span>
            </div>
        </div>

        <!-- Your Strategies Section -->
        <div class="section-card">
            <div class="section-header">
                <h2><i class="fas fa-tasks"></i> Your Strategies</h2>
            </div>
            <div class="section-content">
                <div id="strategiesContainer" style="text-align: center; padding: 40px;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 15px; color: #999;">Loading strategies...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-custom" id="strategyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Strategy Details</h2>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody" style="color: #666;">
                Loading...
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== GLOBAL STATE =====
        let currentUserId = "{{ user_id }}";
        let allStrategies = [];

        // ===== UTILITY FUNCTIONS =====
        function showAlert(type, message) {
            const alertElement = document.getElementById(type + 'Alert');
            const messageElement = document.getElementById(type + 'Message');
            if (alertElement && messageElement) {
                messageElement.textContent = message;
                alertElement.classList.add('show');
                if (type !== 'error') {
                    setTimeout(() => alertElement.classList.remove('show'), 4000);
                }
            }
        }

        function openModal() {
            document.getElementById('strategyModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('strategyModal').classList.remove('show');
        }

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', function() {
            if (!currentUserId || currentUserId === 'None' || currentUserId === '') {
                showAlert('error', 'User not found. Redirecting to login...');
                setTimeout(() => window.location.href = '/login', 2000);
                return;
            }
            loadStrategies();
        });

        // ===== DATA LOADING =====
        function loadStrategies() {
            fetch(`/api/user-strategies?user_id=${currentUserId}`)
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load strategies');
                    return r.json();
                })
                .then(data => {
                    allStrategies = data.success ? data.strategies || [] : [];
                    renderStrategies();
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('strategiesContainer').innerHTML = 
                        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Failed to load strategies</p></div>';
                });
        }

        // ===== RENDERING =====
        function renderStrategies() {
            const container = document.getElementById('strategiesContainer');
            if (allStrategies.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No strategies yet. Create one in your account settings!</p></div>';
                return;
            }
            let html = '<div class="strategy-grid">';
            allStrategies.forEach(s => {
                html += `
                    <div class="strategy-item">
                        <h4>${s.name || 'Unnamed'}</h4>
                        <p>${s.description || 'No description'}</p>
                        <div class="strategy-badges">
                            <span class="badge-item ${s.status === 'active' ? 'active' : 'danger'}">
                                ${s.status === 'active' ? '✓ Active' : '✕ Inactive'}
                            </span>
                            <span class="badge-item">${s.trades_count || 0} Trades</span>
                        </div>
                        <div class="strategy-buttons">
                            
                            <button class="btn-manage" onclick="manageStrategy(${s.id})">Manage</button>
                            
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // ===== ACTIONS =====
        function viewStrategy(id) {
            const s = allStrategies.find(x => x.id === id);
            if (s) {
                document.getElementById('modalBody').innerHTML = `
                    <table style="width:100%; border-collapse:collapse;">
                        <tr><td style="padding:10px; border-bottom:1px solid #eee;"><b>Name</b></td><td style="padding:10px; border-bottom:1px solid #eee;">${s.name}</td></tr>
                        <tr><td style="padding:10px; border-bottom:1px solid #eee;"><b>Status</b></td><td style="padding:10px; border-bottom:1px solid #eee;">${s.status}</td></tr>
                        <tr><td style="padding:10px; border-bottom:1px solid #eee;"><b>Type</b></td><td style="padding:10px; border-bottom:1px solid #eee;">${s.type || 'Manual'}</td></tr>
                        <tr><td style="padding:10px; border-bottom:1px solid #eee;"><b>Trades</b></td><td style="padding:10px; border-bottom:1px solid #eee;">${s.trades_count || 0}</td></tr>
                    </table>
                `;
                openModal();
            }
        }

        function manageStrategy(id) {
            const s = allStrategies.find(x => x.id === id);
            if (s) {
                window.location.href = `/managestrategy?strategy_id=${id}`;
            }
        }

        function closeStrategy(id) {
            if (confirm('Close this strategy?')) {
                fetch('/api/close-strategy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({strategy_id: id, user_id: currentUserId})
                })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        showAlert('success', 'Strategy closed!');
                        loadStrategies();
                    } else {
                        showAlert('error', d.message || 'Failed to close strategy');
                    }
                })
                .catch(err => showAlert('error', 'Error closing strategy'));
            }
        }

        // Close modal on background click
        document.getElementById('strategyModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
